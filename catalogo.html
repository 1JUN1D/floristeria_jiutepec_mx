        // Normalizar texto (quitar tildes y minúsculas)
        function normalize(str) {
            return str.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
        }

        // Estado global de búsqueda y filtro
        let currentFilter = 'todos';
        let currentSearch = '';

        // Renderizar productos
        function renderProducts(filter, search) {
            if (filter !== undefined) currentFilter = filter;
            if (search !== undefined) currentSearch = search;

            const grid = document.getElementById('products-grid');
            const emptyState = document.getElementById('empty-state');
            const resultsCount = document.getElementById('results-count');

            let filteredProducts = products;

            // Aplicar filtro de categoría
            if (currentFilter !== 'todos') {
                filteredProducts = filteredProducts.filter(product =>
                    product.categories.includes(currentFilter)
                );
            }

            // Aplicar búsqueda de texto
            if (currentSearch.trim() !== '') {
                const searchNorm = normalize(currentSearch.trim());
                const searchWords = searchNorm.split(/\s+/);
                filteredProducts = filteredProducts.filter(product => {
                    const text = normalize(product.name + ' ' + product.description + ' ' + product.categories.join(' '));
                    return searchWords.every(word => text.includes(word));
                });
            }

            if (filteredProducts.length === 0) {
                grid.style.display = 'none';
                emptyState.classList.add('active');
                resultsCount.textContent = '0';
                return;
            }

            grid.style.display = 'grid';
            emptyState.classList.remove('active');
            resultsCount.textContent = filteredProducts.length;

            // Intercalar productos para variedad visual
            if (currentFilter === 'todos' && currentSearch.trim() === '') {
                const funebre = filteredProducts.filter(p => p.categories.includes('funebre'));
                const noFunebre = filteredProducts.filter(p => !p.categories.includes('funebre'));

                // Agrupar no-fúnebres por categoría principal
                const categoryGroups = {};
                const categoryOrder = ['ramos', 'centros-mesa', 'pedestales', 'corazones', 'cajas', 'coronas-funebres', 'especiales', 'decoracion', 'premium'];

                noFunebre.forEach(p => {
                    const mainCat = categoryOrder.find(c => p.categories.includes(c)) || 'otros';
                    if (!categoryGroups[mainCat]) categoryGroups[mainCat] = [];
                    categoryGroups[mainCat].push(p);
                });

                // Intercalar por precio dentro de cada grupo (alto-bajo-alto-bajo)
                Object.values(categoryGroups).forEach(group => {
                    group.sort((a, b) => a.price - b.price);
                    const temp = [];
                    let lo = 0, hi = group.length - 1;
                    let pickHigh = true;
                    while (lo <= hi) {
                        if (pickHigh) { temp.push(group[hi--]); }
                        else { temp.push(group[lo++]); }
                        pickHigh = !pickHigh;
                    }
                    group.length = 0;
                    group.push(...temp);
                });

                // Round-robin intercalado
                const interleaved = [];
                const activeCats = categoryOrder.filter(c => categoryGroups[c] && categoryGroups[c].length > 0);
                if (categoryGroups['otros'] && categoryGroups['otros'].length > 0) activeCats.push('otros');

                let maxLen = Math.max(...activeCats.map(c => categoryGroups[c].length));
                for (let i = 0; i < maxLen; i++) {
                    for (const cat of activeCats) {
                        if (categoryGroups[cat] && i < categoryGroups[cat].length) {
                            interleaved.push(categoryGroups[cat][i]);
                        }
                    }
                }

                // Añadir fúnebres al final
                filteredProducts = [...interleaved, ...funebre];
            }

            grid.innerHTML = filteredProducts.map(product => `
                <div class="product-card" data-categories="${product.categories.join(' ')}">
                    <div class="product-image-container" onclick="openLightbox('${product.image}', '${product.name}', '${formatPrice(product.price)}')">
                        <img src="${product.image}" alt="${product.name}" class="product-image" loading="lazy">
                        <div class="zoom-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8"/>
                                <path d="m21 21-4.35-4.35"/>
                                <line x1="11" y1="8" x2="11" y2="14"/>
                                <line x1="8" y1="11" x2="14" y2="11"/>
                            </svg>
                        </div>
                    </div>
                    <div class="product-info">
                        <h3 class="product-name">${product.name}</h3>
                        <div class="product-description">${product.description}</div>
                        <div class="product-footer">
                            <div>
                                <span class="price-label">Desde</span>
                                <div class="product-price">${formatPrice(product.price)}</div>
                            </div>
                            <a href="https://wa.me/5217771626940?text=Hola,%20me%20interesa%20el%20producto:%20${encodeURIComponent(product.name)}%20-%20${formatPrice(product.price)}"
                               class="btn-order"
                               target="_blank">
                                <svg viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/>
                                </svg>
                                Pedir Ahora
                            </a>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Formatear precio
        function formatPrice(price) {
            if (price === 0) return 'Cotización';
            return '$' + price.toLocaleString('es-MX');
        }

        // Filtros
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                renderProducts(this.dataset.filter);
                window.scrollTo({ top: 400, behavior: 'smooth' });
            });
        });

        // Búsqueda
        const searchInput = document.getElementById('search-input');
        const searchClear = document.getElementById('search-clear');
        let searchTimeout;

        searchInput.addEventListener('input', function() {
            clearTimeout(searchTimeout);
            const val = this.value;
            searchClear.classList.toggle('visible', val.length > 0);
            searchTimeout = setTimeout(() => {
                renderProducts(undefined, val);
            }, 250);
        });

        searchClear.addEventListener('click', function() {
            searchInput.value = '';
            searchClear.classList.remove('visible');
            renderProducts(undefined, '');
            searchInput.focus();
        });

        // Lightbox
        function openLightbox(image, name, price) {
            const lightbox = document.getElementById('lightbox');
            const lightboxImage = document.getElementById('lightbox-image');
            const lightboxTitle = document.getElementById('lightbox-title');
            const lightboxPrice = document.getElementById('lightbox-price');

            lightboxImage.src = image;
            lightboxImage.alt = name;
            lightboxTitle.textContent = name;
            lightboxPrice.textContent = price;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            const lightbox = document.getElementById('lightbox');
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
        }

        document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
        document.getElementById('lightbox').addEventListener('click', function(e) {
            if (e.target === this) closeLightbox();
        });

        // Scroll to top
        const scrollTop = document.getElementById('scroll-top');
        window.addEventListener('scroll', function() {
            if (window.scrollY > 500) {
                scrollTop.classList.add('visible');
            } else {
                scrollTop.classList.remove('visible');
            }
        });

        scrollTop.addEventListener('click', function() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // Inicializar
        renderProducts();
    </script>
